name: Deploy frontend naar GitHub Pages

# Bouwt de React/Vite-frontend en publiceert die op GitHub Pages.
# De backend (Flask) draait NIET op Pages; de live demo gebruikt vooraf
# opgeslagen demo-data (VITE_STATIC_DEMO=true -> zie frontend/src/dashboard/api.js).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Eén deploy tegelijk; nieuwe pushes annuleren een lopende run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_STATIC_DEMO: 'true'
      - uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
