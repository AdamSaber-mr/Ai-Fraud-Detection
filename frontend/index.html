<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <!-- SPA-redirect voor GitHub Pages: 404.html stuurt een diep pad hierheen als
         ?/pad; dit zet de echte URL terug zodat react-router 'm oppakt. -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) { return s.replace(/~and~/g, '&') })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23b9a3f0%22/><rect x=%2235%22 y=%2235%22 width=%2230%22 height=%2230%22 rx=%226%22 fill=%22%2315111c%22 transform=%22rotate(45 50 50)%22/></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel — AI fraudedetectie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />

</html>
